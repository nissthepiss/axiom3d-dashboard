<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AXIOM3D — Ground Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #06060c; --surface: #0d0d18; --border: #1a1a2e;
  --border-bright: #252540; --text: #b8b8cc; --text-dim: #6a6a80;
  --text-bright: #e0e0f0; --amber: #f0a030; --amber-dim: #805820;
  --red: #f04040; --red-dim: #602020;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 14px; }
body {
  font-family: 'Share Tech Mono', monospace;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}
#pin-gate {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; z-index: 10000;
}
.gate-logo {
  font-family: 'Oxanium', sans-serif; font-weight: 700;
  font-size: 1.6rem; color: var(--amber);
  letter-spacing: 4px; margin-bottom: 6px;
}
.gate-sub {
  font-size: 0.7rem; color: var(--text-dim);
  letter-spacing: 2px; margin-bottom: 32px;
}
.pin-dots { display: flex; gap: 12px; margin-bottom: 24px; }
.pin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--border-bright);
  background: transparent; transition: all 0.15s;
}
.pin-dot.filled { background: var(--amber); border-color: var(--amber); }
.pin-dot.wrong {
  border-color: var(--red); background: var(--red);
  animation: shake 0.4s ease;
}
.pin-pad { display: grid; grid-template-columns: repeat(3, 64px); gap: 10px; }
.pin-btn {
  width: 64px; height: 54px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text-bright); font-family: 'Oxanium', sans-serif;
  font-size: 1.3rem; cursor: pointer; transition: all 0.1s;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.pin-btn:active { background: var(--amber-dim); border-color: var(--amber); }
.pin-btn.fn { font-size: 0.7rem; color: var(--text-dim); }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
</style>
</head>
<body>
<div id="pin-gate">
  <div class="gate-logo">AXIOM3D</div>
  <div class="gate-sub">GROUND CONTROL</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn fn" onclick="pinClear()">CLR</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn fn" onclick="pinBack()">&#9003;</button>
  </div>
</div>
<div id="app"></div>

const PIN_HASH = '65ab749279c8fbe6d2305db2141ed892e39a80a6823946aaf272414392720ad6';
let pinBuffer = '';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function deriveKey(pin) {
  const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
  return crypto.subtle.importKey('raw', hash, 'AES-GCM', false, ['decrypt']);
}

async function decrypt(pin) {
  try {
    const key = await deriveKey(pin);
    const iv = Uint8Array.from(atob(ENCRYPTED.iv), c => c.charCodeAt(0));
    const tag = Uint8Array.from(atob(ENCRYPTED.tag), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(ENCRYPTED.data), c => c.charCodeAt(0));
    // AES-GCM expects ciphertext + tag concatenated
    const combined = new Uint8Array(data.length + tag.length);
    combined.set(data); combined.set(tag, data.length);
    const plain = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv },
      key,
      combined
    );
    return new TextDecoder().decode(plain);
  } catch { return null; }
}

function updateDots() {
  const dots = document.querySelectorAll('#pin-dots .pin-dot');
  dots.forEach((d, i) => {
    d.classList.toggle('filled', i < pinBuffer.length);
    d.classList.remove('wrong');
  });
}

async function checkPin() {
  const hash = await sha256(pinBuffer);
  if (hash === PIN_HASH) {
    const html = await decrypt(pinBuffer);
    if (html) {
      localStorage.setItem('gc_pin', pinBuffer);
      document.getElementById('pin-gate').style.display = 'none';
      document.getElementById('app').innerHTML = html;
      // Execute any script tags in the decrypted content
      document.getElementById('app').querySelectorAll('script').forEach(s => {
        const ns = document.createElement('script');
        ns.textContent = s.textContent;
        document.body.appendChild(ns);
        s.remove();
      });
    }
  } else {
    const dots = document.querySelectorAll('#pin-dots .pin-dot');
    dots.forEach(d => { d.classList.add('wrong'); d.classList.remove('filled'); });
    pinBuffer = '';
    setTimeout(updateDots, 500);
  }
}

function pinPress(n) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += n;
  updateDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 150);
}

function pinClear() { pinBuffer = ''; updateDots(); }
function pinBack() { pinBuffer = pinBuffer.slice(0, -1); updateDots(); }

// Auto-unlock from saved PIN
(async function() {
  const saved = localStorage.getItem('gc_pin');
  if (saved) {
    const hash = await sha256(saved);
    if (hash === PIN_HASH) {
      const html = await decrypt(saved);
      if (html) {
        document.getElementById('pin-gate').style.display = 'none';
        document.getElementById('app').innerHTML = html;
        document.getElementById('app').querySelectorAll('script').forEach(s => {
          const ns = document.createElement('script');
          ns.textContent = s.textContent;
          document.body.appendChild(ns);
          s.remove();
        });
      }
    }
  }
})();

document.addEventListener('keydown', function(e) {
  if (document.getElementById('pin-gate').style.display === 'none') return;
  if (e.key >= '0' && e.key <= '9') pinPress(e.key);
  else if (e.key === 'Backspace') pinBack();
  else if (e.key === 'Escape') pinClear();
});
</script>
